<!DOCTYPE html>
<html>
<head>
    <title>Heart Prediction</title>
</head>
<body>
    <h2>Heart Disease Prediction</h2>

    <form method="POST">
        Age: <input type="number" name="age"><br>
        Sex: <input type="number" name="sex"><br>
        CP: <input type="number" name="cp"><br>
        BP: <input type="number" name="trestbps"><br>
        Cholesterol: <input type="number" name="chol"><br>
        FBS: <input type="number" name="fbs"><br>
        ECG: <input type="number" name="restecg"><br>
        Max HR: <input type="number" name="thalach"><br>
        Exang: <input type="number" name="exang"><br>
        Oldpeak: <input type="number" name="oldpeak"><br>
        Slope: <input type="number" name="slope"><br>
        CA: <input type="number" name="ca"><br>
        Thal: <input type="number" name="thal"><br>

        <button type="submit">Predict</button>
    </form>

    {% if prediction is defined %}
        <h3>Result: {{ prediction }}</h3>
    {% endif %}
</body>
</html>
